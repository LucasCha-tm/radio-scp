name: Build RadioPlugin

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn package -B

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: RadioPlugin
          path: target/RadioPlugin-*.jar
